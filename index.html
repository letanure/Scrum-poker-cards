    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Scrum Poker Cards",
        "description": "Fun, free planning poker for agile teams with illustrated cards and real-time sessions.",
        "url": "https://scrumpoker.work",
        "applicationCategory": "BusinessApplication",

        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },

    <!-- JSON-LD: Person (creator) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Luiz Tanure",
        "url": "https://github.com/letanure",
        "sameAs": ["https://github.com/letanure"]
      }
    </script>
    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is Scrum Poker Cards?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "A free, real-time planning poker tool for agile teams. Create a session, share the link, and estimate stories together using beautifully illustrated cards."
            }
          },
          {
            "@type": "Question",
            "name": "Do I need to create an account?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Just enter your name and start playing. No signup, no login, no email required."
            }
          },
          {
            "@type": "Question",
            "name": "Is it free?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, completely free. No ads, no premium plans, no hidden costs."
            }
          },
          {
            "@type": "Question",
            "name": "Is my data stored?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. All sessions are ephemeral — they exist only in memory while players are connected. Nothing is saved to a database."
            }
          },
          {
            "@type": "Question",
            "name": "Where do the card illustrations come from?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The illustrations were created by Redbooth and are licensed under Creative Commons Attribution (CC BY 3.0). Each card features a fun idiom matching the effort level."
            }
          }
        ]
      }
    </script>
